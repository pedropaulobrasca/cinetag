services:
  backend:
    build: ./backend
    ports:
      - "3333:3333"
    environment:
      - PORT=3333
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3333
        VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
